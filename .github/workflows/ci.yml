name: Galactic CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master, ci-debug]

jobs:
  # INIT JOB: Install and Cache
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Caches node_modules based on package-lock.json
      - name: Install Dependencies
        run: npm ci

  lint:
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint

  test:
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        timeout-minutes: 4
        run: |
          echo "Running tests and teeing output to test-output.log"
          timeout --signal=SIGKILL 230s npm run test:ci 2>&1 | tee test-output.log || true
          echo "=== tail of test-output.log ==="
          tail -n 200 test-output.log || true

      - name: Collect process snapshot
        if: always()
        run: |
          ps -ef > procs.txt || true
          pgrep -af node > node-procs.txt || true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            test-output.log
            procs.txt
            node-procs.txt
      - name: Debug hanging process
        if: failure() || cancelled()
        run: |
          echo "=== process list ==="
          ps -ef
          echo "=== node processes ==="
          pgrep -af node || true
