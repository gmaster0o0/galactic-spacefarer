name: Galactic CI

on:
  push:
    branches: [main, master, ci-debug]
  pull_request:
    branches: [main, master, ci-debug]
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug mode (runs tests with extended timeout and collects logs)'
        required: false
        default: false
        type: boolean
jobs:
  # INIT JOB: Install and Cache
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm' # Caches node_modules based on package-lock.json
      - name: Install Dependencies
        run: npm ci
  lint:
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint

  test:
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEBUG_MODE: ${{ github.event.inputs.debug_mode }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        timeout-minutes: 20
        shell: bash
        run: |
          set -o pipefail
          echo "Running tests and teeing output to test-output.log"
          if [ "${DEBUG_MODE}" = "true" ]; then
            echo "DEBUG_MODE=true — running extended debug test command"
            npm run test:ci:debug 2>&1 | tee test-output.log
            status=$?
          else
            npm run test:ci 2>&1 | tee test-output.log
            status=$?
          fi
          if [ $status -ne 0 ] || [ "${DEBUG_MODE}" = "true" ]; then
            echo "=== tail of test-output.log ==="
            tail -n 200 test-output.log || true
          fi
          exit $status

      - name: Collect process snapshot
        if: always()
        run: |
          ps -ef > procs.txt || true
          pgrep -af node > node-procs.txt || true

      - name: Collect extra debug info
        if: env.DEBUG_MODE == 'true'
        run: |
          echo "=== open file descriptors for node processes ==="
          for pid in $(pgrep node || true); do
            if [ -n "$pid" ]; then
              echo "--- pid: $pid ---"
              ls -l /proc/$pid/fd || true
            fi
          done

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            test-output.log
            procs.txt
            node-procs.txt
            junit.xml
            vitest-results.json
            coverage/**
      - name: Debug hanging process
        if: failure() || cancelled()
        run: |
          echo "=== process list ==="
          ps -ef
          echo "=== node processes ==="
          pgrep -af node || true
